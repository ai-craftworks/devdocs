<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevDocs — Documentation Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/hljs-theme.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.snow.min.css" />
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="logo" onclick="app.goHome()">
      <div class="logo-icon">D</div>
      <span class="logo-text">DevDocs</span>
    </div>
    <button class="sidebar-toggle" id="sidebarToggle" title="Toggle sidebar">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="8" x2="21" y2="8"/><line x1="3" y1="16" x2="21" y2="16"/>
      </svg>
    </button>
  </div>

  <div class="sidebar-section">
    <span class="sidebar-label">Projects</span>
    <button class="btn-new-project" id="btnNewProject">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New
    </button>
  </div>

  <nav class="project-nav" id="projectNav">
    <div class="nav-loading"><div class="spinner"></div></div>
  </nav>

  <div class="sidebar-footer">
    <div class="search-box">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" placeholder="Search docs..." id="globalSearch" autocomplete="off" />
    </div>
    <div class="search-results" id="searchResults"></div>
  </div>
</aside>

<main class="main" id="main">
  <div id="appContent"></div>
</main>

<!-- Modals -->
<div class="modal-overlay" id="modalOverlay"></div>

<div class="modal" id="projectModal">
  <div class="modal-header">
    <h2 class="modal-title" id="projectModalTitle">New Project</h2>
    <button class="modal-close" onclick="app.closeModal('projectModal')">×</button>
  </div>
  <div class="modal-body">
    <div class="form-group">
      <label>Project Name</label>
      <input type="text" id="projectName" placeholder="e.g. Backend API, Mobile App…" class="form-input" />
    </div>
    <div class="form-group">
      <label>Description <span class="label-hint">(optional)</span></label>
      <textarea id="projectDesc" placeholder="What is this project about?" class="form-textarea" rows="2"></textarea>
    </div>
    <div class="form-row">
      <div class="form-group flex-1">
        <label>Icon</label>
        <div class="emoji-picker" id="emojiPicker">
          <span class="emoji-option selected" data-emoji="📁">📁</span>
          <span class="emoji-option" data-emoji="🚀">🚀</span>
          <span class="emoji-option" data-emoji="⚡">⚡</span>
          <span class="emoji-option" data-emoji="🔧">🔧</span>
          <span class="emoji-option" data-emoji="🌐">🌐</span>
          <span class="emoji-option" data-emoji="🎯">🎯</span>
          <span class="emoji-option" data-emoji="🔬">🔬</span>
          <span class="emoji-option" data-emoji="💡">💡</span>
          <span class="emoji-option" data-emoji="🏗️">🏗️</span>
          <span class="emoji-option" data-emoji="📦">📦</span>
          <span class="emoji-option" data-emoji="🧩">🧩</span>
          <span class="emoji-option" data-emoji="🔐">🔐</span>
        </div>
      </div>
      <div class="form-group flex-1">
        <label>Color</label>
        <div class="color-picker" id="colorPicker">
          <span class="color-option selected" data-color="#4f46e5" style="background:#4f46e5"></span>
          <span class="color-option" data-color="#ec4899" style="background:#ec4899"></span>
          <span class="color-option" data-color="#f97316" style="background:#f97316"></span>
          <span class="color-option" data-color="#059669" style="background:#059669"></span>
          <span class="color-option" data-color="#2563eb" style="background:#2563eb"></span>
          <span class="color-option" data-color="#7c3aed" style="background:#7c3aed"></span>
          <span class="color-option" data-color="#0d9488" style="background:#0d9488"></span>
          <span class="color-option" data-color="#d97706" style="background:#d97706"></span>
        </div>
      </div>
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn-ghost" onclick="app.closeModal('projectModal')">Cancel</button>
    <button class="btn-primary" id="saveProjectBtn" onclick="app.saveProject()">Create Project</button>
  </div>
</div>

<div class="modal" id="repoModal">
  <div class="modal-header">
    <h2 class="modal-title" id="repoModalTitle">New Repository</h2>
    <button class="modal-close" onclick="app.closeModal('repoModal')">×</button>
  </div>
  <div class="modal-body">
    <div class="form-group">
      <label>Repository Name</label>
      <input type="text" id="repoName" placeholder="e.g. Auth Service, Payment Module…" class="form-input" />
    </div>
    <div class="form-group">
      <label>Description <span class="label-hint">(optional)</span></label>
      <textarea id="repoDesc" placeholder="What does this repository contain?" class="form-textarea" rows="2"></textarea>
    </div>
    <div class="form-group">
      <label>Tags <span class="label-hint">(comma separated)</span></label>
      <input type="text" id="repoTags" placeholder="api, auth, v2…" class="form-input" />
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn-ghost" onclick="app.closeModal('repoModal')">Cancel</button>
    <button class="btn-primary" onclick="app.saveRepository()">Create Repository</button>
  </div>
</div>

<div class="modal modal-sm" id="confirmModal">
  <div class="modal-header">
    <h2 class="modal-title">Confirm Delete</h2>
    <button class="modal-close" onclick="app.closeModal('confirmModal')">×</button>
  </div>
  <div class="modal-body">
    <p id="confirmMessage" class="confirm-message"></p>
  </div>
  <div class="modal-footer">
    <button class="btn-ghost" onclick="app.closeModal('confirmModal')">Cancel</button>
    <button class="btn-danger" id="confirmDeleteBtn">Delete</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.min.js"></script>
<script src="/js/cm-bundle.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
